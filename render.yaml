services:
  - type: web
    name: chat-app-backend
    env: node
    rootDir: chatApp_backend-experiment
    buildCommand: "npm install"
    startCommand: "node src/server.js"
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: chat-app-redis
          property: connectionString

  - type: redis
    name: chat-app-redis
    plan: free
    ipAllowList: [] # Allow all connections
